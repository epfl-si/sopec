- name: Create Deployment
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ app }}-bot"
        namespace: "{{ openshift_namespace }}"
      spec:
        replicas: 1
        strategy:
          type: Recreate
        selector:
          matchLabels:
            app: "{{ app }}"
            component: bot
        template:
          metadata:
            labels:
              app: "{{ app }}"
              component: bot
          spec:
            containers:
              - image: "{{ image }}:{{ version }}"
                imagePullPolicy: Always
                name: "{{ app }}"
                envFrom:
                  - secretRef:
                      name: "{{ app }}-secrets"
                resources:
                  requests:
                    cpu: 10m
                    memory: 150Mi
                  limits:
                    memory: 350Mi
            imagePullSecrets:
              - name: svc0176-pull-secret
