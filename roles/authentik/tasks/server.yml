- name: Create service
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ app }}-server"
        namespace: "{{ openshift_namespace }}"
      spec:
        selector:
          app: "{{ app }}"
          component: server
        ports:
          - name: "{{ app }}-svc-port"
            protocol: TCP
            port: 80
            targetPort: http

- name: Create Deployment
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ app }}-server"
        namespace: "{{ openshift_namespace }}"
      spec:
        replicas: 1
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
        selector:
          matchLabels:
            app: "{{ app }}"
            component: server
        template:
          metadata:
            labels:
              app: "{{ app }}"
              component: server
          spec:
            containers:
              - image: "{{ image }}:{{ version }}"
                imagePullPolicy: Always
                name: "{{ app }}-server"
                args: ["server"]
                ports:
                  - containerPort: 9000
                    name: http
                envFrom:
                  - secretRef:
                      name: "{{ app }}-secrets"
                resources:
                  requests:
                    cpu: 10m
                    memory: 128Mi
                  limits:
                    memory: 1024Mi
                readinessProbe:
                  httpGet:
                    path: /-/health/ready/
                    port: 9000
                  initialDelaySeconds: 30
                  timeoutSeconds: 5
                livenessProbe:
                  httpGet:
                    path: /-/health/live/
                    port: 9000
                  initialDelaySeconds: 30
                  timeoutSeconds: 5
                volumeMounts:
                  - name: authentik-media
                    mountPath: /media
            volumes:
              - name: authentik-media
                persistentVolumeClaim:
                  claimName: "{{ app }}-data"
            imagePullSecrets:
              - name: svc0176-pull-secret

- name: Create route
  kubernetes.core.k8s:
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: "{{ app }}"
        namespace: "{{ openshift_namespace }}"
        labels:
          app: "{{ app }}"
          route: "public-cf"
      spec:
        host: "{{ subdomain }}{% if openshift_env == 'test' %}-test{% endif %}.{{ domain }}"
        to:
          kind: Service
          name: "{{ app }}-server"
        port:
          targetPort: "{{ app }}-svc-port"
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
