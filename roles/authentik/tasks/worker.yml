- name: Create Deployment
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ app }}-worker"
        namespace: "{{ openshift_namespace }}"
      spec:
        replicas: 1
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
        selector:
          matchLabels:
            app: "{{ app }}"
            component: worker
        template:
          metadata:
            labels:
              app: "{{ app }}"
              component: worker
          spec:
            containers:
              - image: "{{ image }}:{{ version }}"
                imagePullPolicy: Always
                name: "{{ app }}-worker"
                args: ["worker"]
                envFrom:
                  - secretRef:
                      name: "{{ app }}-secrets"
                resources:
                  requests:
                    cpu: 10m
                    memory: 128Mi
                  limits:
                    memory: 512Mi
                readinessProbe:
                  exec:
                    command:
                      - ak
                      - healthcheck
                  initialDelaySeconds: 30
                  timeoutSeconds: 5
                livenessProbe:
                  exec:
                    command:
                      - ak
                      - healthcheck
                  initialDelaySeconds: 30
                  timeoutSeconds: 5
                volumeMounts:
                  - name: authentik-media
                    mountPath: /media
            volumes:
              - name: authentik-media
                persistentVolumeClaim:
                  claimName: "{{ app }}-data"
            imagePullSecrets:
              - name: svc0176-pull-secret
