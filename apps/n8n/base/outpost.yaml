apiVersion: v1
kind: Service
metadata:
  name: n8n-outpost
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: outpost
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: outpost
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 9000
      targetPort: 9000
    - name: https
      protocol: TCP
      port: 9443
      targetPort: 9443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-outpost
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: outpost
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/version: "2025.8"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/component: outpost
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/component: outpost
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: outpost
          image: quay-its.epfl.ch/svc0176/authentik-proxy:2025.8
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: n8n-secrets
          ports:
            - containerPort: 9000
              name: http
            - containerPort: 9443
              name: https
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            timeoutSeconds: 3
