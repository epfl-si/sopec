apiVersion: v1
kind: Service
metadata:
  name: owui
  labels:
    app.kubernetes.io/name: owui
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  selector:
    app.kubernetes.io/name: owui
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: owui
  labels:
    app.kubernetes.io/name: owui
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    route: public-cf
spec:
  host: owui.fsd.epfl.ch
  to:
    kind: Service
    name: owui
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: owui
  labels:
    app.kubernetes.io/name: owui
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: owui
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: owui
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: owui
          image: quay-its.epfl.ch/svc0176/open-webui:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: owui-secrets
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            timeoutSeconds: 3
          volumeMounts:
            - name: owui-data
              mountPath: /app/backend/data
            - name: static
              mountPath: /app/backend/open_webui/static
      volumes:
        - name: owui-data
          persistentVolumeClaim:
            claimName: owui-data
        - name: static
          emptyDir: {}
