apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: svc0176t-isas-fsd

resources:
  - ../../base

patches:
  - target:
      kind: Route
      name: owui
    patch: |-
      - op: replace
        path: /spec/host
        value: owui-test.fsd.epfl.ch
  - target:
      kind: Deployment
      name: owui
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
