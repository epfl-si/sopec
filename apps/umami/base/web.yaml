apiVersion: v1
kind: Service
metadata:
  name: umami
  labels:
    app.kubernetes.io/name: umami
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: umami
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: umami
  labels:
    app.kubernetes.io/name: umami
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    route: public-cf
spec:
  host: umami.fsd.epfl.ch
  to:
    kind: Service
    name: umami
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: umami
  labels:
    app.kubernetes.io/name: umami
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/version: "3.0.3"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: umami
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: umami
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      initContainers:
        - name: copy-app
          image: quay-its.epfl.ch/svc0176/umami:3.0.3
          command: [cp, "-r", /app/., /tmp/umami-app/]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: app
              mountPath: /tmp/umami-app
      containers:
        - name: umami
          image: quay-its.epfl.ch/svc0176/umami:3.0.3
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: umami-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: app
              mountPath: /app
      volumes:
        - name: app
          emptyDir: {}
