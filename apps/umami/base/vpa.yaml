apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: umami-vpa
spec:
  resourcePolicy:
    containerPolicies:
      - containerName: umami
        controlledResources:
          - cpu
          - memory
        controlledValues: RequestsAndLimits
        maxAllowed:
          cpu: 100m
          memory: 512Mi
        minAllowed:
          cpu: 25m
          memory: 128Mi
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: umami
  updatePolicy:
    updateMode: Auto
