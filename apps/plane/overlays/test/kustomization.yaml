apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: svc0176t-isas-fsd

resources:
  - ../../base

patches:
  # Routes : ajout du suffixe -test sur le hostname
  - target:
      kind: Route
    patch: |-
      - op: replace
        path: /spec/host
        value: plane-test.fsd.epfl.ch
  # ConfigMap plane-vars : URLs de l'env test
  - target:
      kind: ConfigMap
      name: plane-vars
    patch: |-
      - op: replace
        path: /data/WEB_URL
        value: https://plane-test.fsd.epfl.ch
      - op: replace
        path: /data/CORS_ALLOWED_ORIGINS
        value: http://plane-test.fsd.epfl.ch,https://plane-test.fsd.epfl.ch
  # ConfigMap plane-live-vars : API URL avec namespace test
  - target:
      kind: ConfigMap
      name: plane-live-vars
    patch: |-
      - op: replace
        path: /data/API_BASE_URL
        value: http://plane-api.svc0176t-isas-fsd.svc.cluster.local:8000/
