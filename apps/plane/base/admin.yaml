apiVersion: v1
kind: Service
metadata:
  name: plane-admin
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: admin
    app.kubernetes.io/part-of: sopec
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: admin
  ports:
    - name: admin
      port: 3000
      protocol: TCP
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-admin
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: admin
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plane
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane
        app.kubernetes.io/component: admin
        app.kubernetes.io/part-of: sopec
    spec:
      serviceAccountName: plane-srv-account
      containers:
        - name: admin
          image: quay-its.epfl.ch/svc0176/plane-admin:stable
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 25m
              memory: 500Mi
            limits:
              memory: 500Mi
