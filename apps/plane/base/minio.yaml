apiVersion: v1
kind: Service
metadata:
  name: plane-minio
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: sopec
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: 9000
      protocol: TCP
      targetPort: 9000
    - name: console
      port: 9090
      protocol: TCP
      targetPort: 9090
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plane-minio
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: sopec
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: sopec
  volumeMode: Filesystem
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: plane-minio
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: sopec
spec:
  serviceName: plane-minio
  selector:
    matchLabels:
      app.kubernetes.io/name: plane
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane
        app.kubernetes.io/component: minio
        app.kubernetes.io/part-of: sopec
    spec:
      serviceAccountName: plane-srv-account
      containers:
        - name: minio
          image: quay-its.epfl.ch/svc0176/minio:latest
          imagePullPolicy: IfNotPresent
          args: [server, /data, --console-address, ":9090"]
          resources:
            requests:
              cpu: 50m
              memory: 1000Mi
            limits:
              cpu: 500m
              memory: 1000Mi
          envFrom:
            - secretRef:
                name: plane-doc-store-secrets
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plane-minio
