apiVersion: v1
kind: Service
metadata:
  name: plane-redis
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: sopec
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      protocol: TCP
      targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plane-redis
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: sopec
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  storageClassName: sopec
  volumeMode: Filesystem
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: plane-redis
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: sopec
spec:
  serviceName: plane-redis
  selector:
    matchLabels:
      app.kubernetes.io/name: plane
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: sopec
    spec:
      serviceAccountName: plane-srv-account
      containers:
        - name: redis
          image: quay-its.epfl.ch/svc0176/valkey:7.2.5-alpine
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 1000Mi
            limits:
              memory: 1000Mi
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plane-redis
