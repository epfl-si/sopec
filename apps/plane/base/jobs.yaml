apiVersion: batch/v1
kind: Job
metadata:
  name: plane-minio-bucket-1
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: init
    app.kubernetes.io/part-of: sopec
spec:
  backoffLimit: 6
  completionMode: NonIndexed
  template:
    spec:
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 120
      serviceAccountName: plane-srv-account
      initContainers:
        - name: wait-for-minio
          image: quay-its.epfl.ch/svc0176/busybox:latest
          resources:
            requests:
              cpu: 25m
              memory: 50Mi
            limits:
              memory: 50Mi
          command:
            - sh
            - "-c"
            - "until nslookup plane-minio.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for plane-minio; sleep 2; done"
      containers:
        - name: create-bucket
          image: quay-its.epfl.ch/svc0176/minio-mc:latest
          imagePullPolicy: IfNotPresent
          command: [/bin/sh]
          args:
            - "-c"
            - >-
              /usr/bin/mc config host add plane-app-minio http://plane-minio.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY";
              /usr/bin/mc mb plane-app-minio/$AWS_S3_BUCKET_NAME;
              /usr/bin/mc anonymous set download plane-app-minio/$AWS_S3_BUCKET_NAME; exit 0;
          envFrom:
            - secretRef:
                name: plane-doc-store-secrets
          resources:
            requests:
              cpu: 25m
              memory: 500Mi
            limits:
              memory: 500Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: plane-api-migrate-1
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: sopec
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: sopec
    spec:
      restartPolicy: OnFailure
      serviceAccountName: plane-srv-account
      containers:
        - name: migrate
          image: quay-its.epfl.ch/svc0176/plane-backend:stable
          command: [./bin/docker-entrypoint-migrator.sh]
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 25m
              memory: 500Mi
            limits:
              memory: 500Mi
          envFrom:
            - configMapRef:
                name: plane-vars
            - secretRef:
                name: plane-secrets
            - secretRef:
                name: plane-doc-store-secrets
