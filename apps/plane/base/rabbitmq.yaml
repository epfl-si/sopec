apiVersion: v1
kind: Service
metadata:
  name: plane-rabbitmq
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: rabbitmq
    app.kubernetes.io/part-of: sopec
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: rabbitmq
  ports:
    - name: amqp
      port: 5672
      protocol: TCP
      targetPort: 5672
    - name: management
      port: 15672
      protocol: TCP
      targetPort: 15672
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plane-rabbitmq
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: rabbitmq
    app.kubernetes.io/part-of: sopec
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  storageClassName: sopec
  volumeMode: Filesystem
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: plane-rabbitmq
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: rabbitmq
    app.kubernetes.io/part-of: sopec
spec:
  serviceName: plane-rabbitmq
  selector:
    matchLabels:
      app.kubernetes.io/name: plane
      app.kubernetes.io/component: rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane
        app.kubernetes.io/component: rabbitmq
        app.kubernetes.io/part-of: sopec
    spec:
      serviceAccountName: plane-srv-account
      containers:
        - name: rabbitmq
          image: quay-its.epfl.ch/svc0176/rabbitmq:3.13.6-management-alpine
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 1000Mi
            limits:
              memory: 1000Mi
          envFrom:
            - secretRef:
                name: plane-rabbitmq-secrets
          volumeMounts:
            - mountPath: /var/lib/rabbitmq
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plane-rabbitmq
