apiVersion: v1
kind: Service
metadata:
  name: plane-api
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sopec
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: api
  ports:
    - name: api
      port: 8000
      protocol: TCP
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-api
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plane
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plane
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sopec
    spec:
      serviceAccountName: plane-srv-account
      containers:
        - name: api
          image: quay-its.epfl.ch/svc0176/plane-backend:stable
          imagePullPolicy: Always
          command: [./bin/docker-entrypoint-api.sh]
          resources:
            requests:
              cpu: 25m
              memory: 500Mi
            limits:
              memory: 500Mi
          envFrom:
            - configMapRef:
                name: plane-vars
            - secretRef:
                name: plane-secrets
            - secretRef:
                name: plane-doc-store-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 8000
              scheme: HTTP
            failureThreshold: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
