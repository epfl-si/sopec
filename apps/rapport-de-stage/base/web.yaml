apiVersion: v1
kind: Service
metadata:
  name: rapport-de-stage
  labels:
    app.kubernetes.io/name: rapport-de-stage
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: rapport-de-stage
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rapport-de-stage
  labels:
    app.kubernetes.io/name: rapport-de-stage
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    route: public-cf
spec:
  host: rapport-de-stage.fsd.epfl.ch
  to:
    kind: Service
    name: rapport-de-stage
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rapport-de-stage
  labels:
    app.kubernetes.io/name: rapport-de-stage
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/version: "1.9"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rapport-de-stage
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rapport-de-stage
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: rapport-de-stage
          image: quay-its.epfl.ch/svc0176/rapport-de-stage:1.9
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
