apiVersion: v1
kind: Service
metadata:
  name: 1time-redis
  labels:
    app.kubernetes.io/name: 1time
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: sopec
spec:
  selector:
    app.kubernetes.io/name: 1time
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 1time-redis
  labels:
    app.kubernetes.io/name: 1time
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: 1time
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: 1time
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: redis
          image: quay-its.epfl.ch/svc0176/redis:8.0-M04
          imagePullPolicy: Always
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: 1time-redis-data
