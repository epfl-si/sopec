apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onetime-redis-data
  labels:
    app.kubernetes.io/name: 1time
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: sopec
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: sopec
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onetime-files
  labels:
    app.kubernetes.io/name: 1time
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: sopec
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: sopec
