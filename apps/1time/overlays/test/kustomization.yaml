apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: svc0176t-isas-fsd

resources:
  - ../../base

patches:
  - target:
      kind: Route
      name: onetime-web
    patch: |-
      - op: replace
        path: /spec/host
        value: paste-test.fsd.epfl.ch
  - target:
      kind: Deployment
      name: onetime-web
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: onetime-web
      spec:
        template:
          spec:
            containers:
              - name: onetime-web
                env:
                  - name: APP_HOSTNAME
                    value: paste-test.fsd.epfl.ch
