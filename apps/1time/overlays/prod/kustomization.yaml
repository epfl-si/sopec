apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: svc0176p-isas-fsd

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: onetime-web
    patch: |-
      - op: replace
        path: /spec/template/spec/initContainers/0/resources/requests/cpu
        value: 8m
      - op: replace
        path: /spec/template/spec/initContainers/0/resources/requests/memory
        value: 96Mi
      - op: replace
        path: /spec/template/spec/initContainers/0/resources/limits/memory
        value: 96Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 38m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 96Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 96Mi
  - target:
      kind: Deployment
      name: onetime-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 38m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 192Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 192Mi
  - target:
      kind: Deployment
      name: onetime-redis
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 8m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 96Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 96Mi
