apiVersion: v1
kind: Service
metadata:
  name: boardfsdash
  labels:
    app.kubernetes.io/name: boardfsdash
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: boardfsdash
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: boardfsdash
  labels:
    app.kubernetes.io/name: boardfsdash
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    route: public-cf
spec:
  host: dash.fsd.epfl.ch
  to:
    kind: Service
    name: boardfsdash
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardfsdash
  labels:
    app.kubernetes.io/name: boardfsdash
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/version: "1.1"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boardfsdash
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boardfsdash
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: boardfsdash
          image: quay-its.epfl.ch/svc0176/boardfsdash:1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: boardfsdash-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: boardfsdash-data
