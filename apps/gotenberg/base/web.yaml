apiVersion: v1
kind: Service
metadata:
  name: gotenberg
  labels:
    app.kubernetes.io/name: gotenberg
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  selector:
    app.kubernetes.io/name: gotenberg
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotenberg
  labels:
    app.kubernetes.io/name: gotenberg
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gotenberg
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotenberg
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      containers:
        - name: gotenberg
          image: gotenberg/gotenberg:8
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: CHROMIUM_DISABLE_SANDBOX
              value: "true"
            - name: TMPDIR
              value: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 512Mi
            limits:
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: gotenberg-tmp
              mountPath: /gotenberg/tmp
            - name: chromium-tmp
              mountPath: /.local
            - name: chromium-config
              mountPath: /.config
            - name: chromium-cache
              mountPath: /.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: gotenberg-tmp
          emptyDir: {}
        - name: chromium-tmp
          emptyDir: {}
        - name: chromium-config
          emptyDir: {}
        - name: chromium-cache
          emptyDir: {}
