apiVersion: v1
kind: Service
metadata:
  name: eeee
  labels:
    app.kubernetes.io/name: eeee
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  selector:
    app.kubernetes.io/name: eeee
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: eeee
  labels:
    app.kubernetes.io/name: eeee
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    route: private
spec:
  host: eeee.epfl.ch
  to:
    kind: Service
    name: eeee
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eeee
  labels:
    app.kubernetes.io/name: eeee
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eeee
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eeee
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: eeee
          image: quay-its.epfl.ch/svc0176/eeee:1.5.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: eeee-secrets
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: eeee-log
              mountPath: /app/logs
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: eeee-log
          persistentVolumeClaim:
            claimName: eeee-log
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eeee-log
  labels:
    app.kubernetes.io/name: eeee
    app.kubernetes.io/part-of: sopec
spec:
  storageClassName: ocs-storagecluster-cephfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Mi
