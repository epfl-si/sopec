apiVersion: v1
kind: Service
metadata:
  name: zipline-web
  labels:
    app.kubernetes.io/name: zipline
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  selector:
    app.kubernetes.io/name: zipline
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: frontend
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: zipline
  labels:
    app.kubernetes.io/name: zipline
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    route: public-cf
spec:
  host: zipline.fsd.epfl.ch
  to:
    kind: Service
    name: zipline-web
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipline-web
  labels:
    app.kubernetes.io/name: zipline
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zipline
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zipline
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: zipline
          image: ghcr.io/diced/zipline:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: frontend
          envFrom:
            - secretRef:
                name: zipline-secrets
          resources:
            requests:
              cpu: 10m
              memory: 350Mi
            limits:
              memory: 350Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
