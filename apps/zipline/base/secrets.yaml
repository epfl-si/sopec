apiVersion: v1
kind: Secret
metadata:
  name: zipline-db-credentials
  labels:
    app.kubernetes.io/name: zipline
    app.kubernetes.io/part-of: sopec
    cnpg.io/reload: "true"
type: kubernetes.io/basic-auth
stringData:
  username: zipline-user
  password: "{{ .env.database.password }}"
  database: zipline-db
---
apiVersion: v1
kind: Secret
metadata:
  name: zipline-secrets
  labels:
    app.kubernetes.io/name: zipline
    app.kubernetes.io/part-of: sopec
type: Opaque
stringData:
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres-cluster-rw
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: zipline-db
  DB_POSTGRESDB_USER: zipline-user
  DB_POSTGRESDB_PASSWORD: "{{ .env.database.password }}"
  DATABASE_URL: "postgresql://zipline-user:{{ .env.database.password }}@postgres-cluster-rw:5432/zipline-db"
  CORE_HOSTNAME: "0.0.0.0"
  CORE_PORT: "3000"
  DATASOURCE_TYPE: s3
  DATASOURCE_S3_REGION: us-east-1
  DATASOURCE_S3_ENDPOINT: "{{ .env.s3.endpoint }}"
  DATASOURCE_S3_ACCESS_KEY_ID: "{{ .env.s3.accesskey }}"
  DATASOURCE_S3_SECRET_ACCESS_KEY: "{{ .env.s3.secretkey }}"
  DATASOURCE_S3_BUCKET: "{{ .env.s3.name }}"
  DATASOURCE_S3_FORCE_PATH_STYLE: "true"
  CORE_SECRET: "{{ .env.web.secret }}"
  PRESIGNED_URL_EXPIRATION: "3600"
