apiVersion: v1
kind: Service
metadata:
  name: grist-web
  labels:
    app.kubernetes.io/name: grist
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: grist
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grist
  labels:
    app.kubernetes.io/name: grist
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    route: public-cf
spec:
  host: grist.fsd.epfl.ch
  to:
    kind: Service
    name: grist-web
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grist-web
  labels:
    app.kubernetes.io/name: grist
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/version: "1.6.1"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grist
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grist
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: grist
          image: quay-its.epfl.ch/svc0176/grist-oss:1.6.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8484
              name: http
          envFrom:
            - secretRef:
                name: grist-secrets
          resources:
            requests:
              cpu: 10m
              memory: 500Mi
            limits:
              memory: 1000Mi
          readinessProbe:
            tcpSocket:
              port: 8484
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 8484
            initialDelaySeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: grist-data
              mountPath: /persist
      volumes:
        - name: grist-data
          persistentVolumeClaim:
            claimName: grist-data
