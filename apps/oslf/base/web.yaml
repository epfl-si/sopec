apiVersion: v1
kind: Service
metadata:
  name: oslf
  labels:
    app.kubernetes.io/name: oslf
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  selector:
    app.kubernetes.io/name: oslf
    app.kubernetes.io/component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oslf
  labels:
    app.kubernetes.io/name: oslf
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oslf
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oslf
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: oslf
          image: ghcr.io/epfl-fsd/oslf:1.2.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: oslf-secrets
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 100Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
