apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: sopec
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/version: "2025.8.3"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      containers:
        - name: worker
          image: ghcr.io/goauthentik/server:2025.8.3
          imagePullPolicy: Always
          args: ["worker"]
          envFrom:
            - secretRef:
                name: authentik-secrets
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command: [ak, healthcheck]
            initialDelaySeconds: 30
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: [ak, healthcheck]
            initialDelaySeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: media
              mountPath: /media
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-data
