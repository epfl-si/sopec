apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: miamtrix-logs
  labels:
    app.kubernetes.io/name: miamtrix
    app.kubernetes.io/component: bot
    app.kubernetes.io/part-of: sopec
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miamtrix-bot
  labels:
    app.kubernetes.io/name: miamtrix
    app.kubernetes.io/component: bot
    app.kubernetes.io/part-of: sopec
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: miamtrix
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: miamtrix
        app.kubernetes.io/component: bot
        app.kubernetes.io/part-of: sopec
    spec:
      imagePullSecrets:
        - name: svc0176-pull-secret
      volumes:
        - name: bot-logs
          persistentVolumeClaim:
            claimName: miamtrix-logs
      containers:
        - name: miamtrix
          image: quay-its.epfl.ch/svc0176/miamtrix:1.7.0
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: miamtrix-secrets
          volumeMounts:
            - name: bot-logs
              mountPath: /logs
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 50Mi
